name: Deploy Viral Techh Studio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/portfolio_assets
          cat .deploy/index.part.* | tr -d '\n\r' | base64 --decode > _site/index.html
          cp portfolio_assets/*.webp _site/portfolio_assets/
          cp animations.css animations.js _site/
          python - <<'PY'
          from pathlib import Path
          page = Path('_site/index.html')
          html = page.read_text(encoding='utf-8')
          stylesheet = '<link rel="stylesheet" href="animations.css">'
          script = '<script src="animations.js" defer></script>'
          if stylesheet not in html:
              html = html.replace('</head>', f'  {stylesheet}\n</head>')
          if script not in html:
              html = html.replace('</body>', f'  {script}\n</body>')
          page.write_text(html, encoding='utf-8')
          PY
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
